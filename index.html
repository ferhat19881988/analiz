<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f7fb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="format-detection" content="telephone=no" />
  <title>Fenomen Öğrenci Paneli</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --text:#111827;
      --muted:#64748b;
      --line:#e2e8f0;
      --primary:#2563eb;
      --primary-dark:#1d4ed8;
      --success:#16a34a;
      --warning:#d97706;
      --danger:#dc2626;
      --soft:#eef4ff;
      --radius:22px;
      --shadow:0 18px 45px rgba(15, 23, 42, .08);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{-webkit-text-size-adjust:100%;scroll-behavior:smooth;width:100%;overflow-x:hidden;overflow-y:auto;height:auto}
    body{
      margin:0;
      width:100%;
      overflow-x:hidden;
      font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      background:radial-gradient(circle at top left,#eaf2ff 0,#f7f9fd 38%,#f6f7fb 100%);
      color:var(--text);
      min-height:100vh;
      min-height:100dvh;
      overflow-y:auto;
      overscroll-behavior-y:auto;
      padding-left:env(safe-area-inset-left);
      padding-right:env(safe-area-inset-right);
    }
    img{max-width:100%;display:block}
    .app-shell{max-width:1180px;margin:0 auto;padding:24px 18px 40px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px}
    .brand{display:flex;align-items:center;gap:14px;min-width:0}
    .brand > div:not(.logo-box){min-width:0}
    .logo-box{width:78px;height:78px;min-width:78px;background:transparent;border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 22px rgba(15,23,42,.08);overflow:hidden;flex:0 0 78px;line-height:0}
    .logo-img{display:block;width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain;padding:0;flex:0 0 auto}
    .brand h1{font-size:20px;margin:0;font-weight:800;letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .brand p{margin:4px 0 0;color:var(--muted);font-size:13px}
    .card{background:rgba(255,255,255,.92);border:1px solid rgba(226,232,240,.9);border-radius:var(--radius);box-shadow:var(--shadow)}
    .login-wrap{min-height:calc(100dvh - 90px);display:grid;place-items:center;padding:20px 0}
    .login-card{width:min(470px,100%);padding:30px}
    .login-logo{width:116px;height:116px;border-radius:16px;background:transparent;display:flex;align-items:center;justify-content:center;box-shadow:0 14px 30px rgba(15,23,42,.10);overflow:hidden;margin:0 auto 18px;line-height:0}
    .login-logo img{display:block;width:100%;height:100%;max-width:100%;max-height:100%;object-fit:contain;padding:0}
    .login-title{text-align:center;margin:0;font-size:26px;font-weight:800;letter-spacing:-.03em}
    .login-sub{text-align:center;color:var(--muted);line-height:1.5;margin:9px 0 24px}
    label{font-size:13px;font-weight:700;color:#334155;display:block;margin-bottom:8px}
    input,select,textarea{
      width:100%;
      max-width:100%;border:1px solid #dbe3ef;background:#fff;color:var(--text);border-radius:14px;padding:13px 14px;font:inherit;font-size:16px;outline:none;transition:.18s;appearance:none;-webkit-appearance:none;
    }
    input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(37,99,235,.12)}
    textarea{min-height:96px;resize:vertical}
    .btn{border:0;border-radius:14px;padding:12px 16px;min-height:46px;touch-action:manipulation;font:inherit;font-weight:800;cursor:pointer;transition:.18s;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none}
    .btn-primary{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;box-shadow:0 10px 24px rgba(37,99,235,.22)}
    .btn-primary:hover{transform:translateY(-1px);box-shadow:0 14px 30px rgba(37,99,235,.28)}
    .btn-light{background:#f1f5f9;color:#0f172a}
    .btn-light:hover{background:#e2e8f0}
    .btn-danger{background:#fee2e2;color:#991b1b}
    .btn-ghost{background:transparent;color:#334155;border:1px solid var(--line)}
    .btn:disabled{opacity:.55;cursor:not-allowed;transform:none}
    .w-100{width:100%}
    .alert{border-radius:16px;padding:13px 14px;margin-top:14px;font-size:14px;line-height:1.45;display:none}
    .alert.show{display:block}
    .alert.ok{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
    .alert.bad{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
    .alert.info{background:#e0f2fe;color:#075985;border:1px solid #bae6fd}
    .grid{display:grid;gap:16px}
    .grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .student-hero{padding:22px;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:center;margin-bottom:16px}
    .student-hero h2{margin:0 0 8px;font-size:25px;letter-spacing:-.03em}
    .meta-row{display:flex;flex-wrap:wrap;gap:8px}
    .pill{display:inline-flex;align-items:center;gap:6px;background:#f1f5f9;border:1px solid #e2e8f0;color:#334155;border-radius:999px;padding:7px 10px;font-size:13px;font-weight:700}
    .pill.blue{background:#eef4ff;color:#1d4ed8;border-color:#dbeafe}
    .pill.green{background:#dcfce7;color:#166534;border-color:#bbf7d0}
    .pill.orange{background:#fff7ed;color:#9a3412;border-color:#fed7aa}
    .stat-card{padding:18px;border-radius:20px;background:#fff;border:1px solid var(--line);box-shadow:0 12px 28px rgba(15,23,42,.05)}
    .stat-card span{display:block;color:var(--muted);font-size:13px;font-weight:700;margin-bottom:8px}
    .stat-card strong{display:block;font-size:26px;letter-spacing:-.03em}
    .tabs{display:flex;gap:10px;overflow-x:auto;padding:4px 0 14px;margin:0 0 4px;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab{white-space:nowrap;min-height:44px;touch-action:manipulation;border:1px solid var(--line);background:#fff;color:#334155;border-radius:999px;padding:10px 14px;font-weight:800;cursor:pointer}
    .tab.active{background:#1d4ed8;color:#fff;border-color:#1d4ed8;box-shadow:0 10px 25px rgba(29,78,216,.18)}
    .section-card{padding:20px;margin-top:8px}
    .section-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:16px}
    .section-head h3{margin:0;font-size:20px;letter-spacing:-.02em}
    .section-head p{margin:5px 0 0;color:var(--muted);font-size:14px;line-height:1.45}
    .entry-row{border:1px solid var(--line);border-radius:20px;background:#fbfdff;padding:16px;margin-bottom:12px}
    .row-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
    .row-title strong{font-size:15px}
    .mini{font-size:12px;color:var(--muted);font-weight:700}
    .task-card{border:1px solid var(--line);background:#fff;border-radius:20px;padding:16px;margin-bottom:12px}
    .task-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
    .task-title{font-weight:800;font-size:16px;margin:0 0 4px}
    .task-sub{color:var(--muted);font-size:13px;margin:0}
    .task-line{display:grid;grid-template-columns:1fr auto;gap:12px;padding:12px;border-radius:14px;background:#f8fafc;border:1px solid #edf2f7;margin-top:8px;align-items:center}
    .progress-wrap{margin-top:8px;background:#e2e8f0;border-radius:999px;height:9px;overflow:hidden}
    .progress-bar{height:100%;width:0;background:linear-gradient(90deg,#2563eb,#16a34a);border-radius:999px}
    .message-card{border:1px solid var(--line);border-radius:20px;background:#fff;padding:16px;margin-bottom:12px}
    .message-card.unread{border-color:#bfdbfe;background:#f8fbff}
    .message-title{font-weight:800;margin:0 0 6px}
    .message-text{line-height:1.55;color:#334155;margin:0 0 12px;white-space:pre-wrap}
    .analysis-list{display:grid;gap:12px}
    .course-line{padding:14px;border:1px solid var(--line);border-radius:18px;background:#fff}
    .course-line-top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:8px}
    .course-line-top strong{font-size:15px}
    .course-line-top span{font-size:13px;color:var(--muted);font-weight:700}
    .empty{border:1px dashed #cbd5e1;background:#f8fafc;border-radius:20px;padding:22px;text-align:center;color:#64748b;line-height:1.55}
    .footer{text-align:center;color:#64748b;font-size:12px;margin-top:24px;font-weight:600}
    .hidden{display:none!important}
    .loading{position:fixed;inset:0;background:rgba(248,250,252,.78);backdrop-filter:blur(8px);z-index:50;display:none;place-items:center;text-align:center;color:#334155;font-weight:800}
    .loading.show{display:grid}
    .spinner{width:44px;height:44px;border-radius:50%;border:5px solid #dbeafe;border-top-color:#2563eb;animation:spin 1s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:860px){
      .grid-4,.grid-3,.grid-2{grid-template-columns:1fr}
      .student-hero{grid-template-columns:1fr}
      .section-head{display:block}
      .topbar{align-items:flex-start;flex-direction:column}
      .brand h1{white-space:normal}
      .app-shell{padding:16px 12px 30px}
      .login-card{padding:24px 18px}
      .student-hero h2{font-size:22px}
      .task-line,.course-line-top,.task-top,.row-title{grid-template-columns:1fr;display:block}
    }
    @media(max-width:560px){
      .app-shell{padding:14px 10px 24px}
      .card,.task-card,.message-card,.course-line,.entry-row{border-radius:18px}
      .student-hero,.section-card{padding:16px}
      .login-card{padding:22px 14px}
      .login-title{font-size:23px}
      .brand{align-items:center;gap:11px;width:100%}
      .logo-box{width:62px;height:62px;min-width:62px;flex-basis:62px;border-radius:12px}
      .login-logo{width:104px;height:104px;border-radius:15px}
      .topbar .btn{width:100%}
      .tab{padding:10px 12px;font-size:14px}
      .pill{font-size:12px}
      .stat-card strong{font-size:22px}
    }

    .day-filter-strip{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;margin-bottom:8px;scrollbar-width:none}
    .day-filter-strip::-webkit-scrollbar{display:none}
    .day-filter-btn{white-space:nowrap;border:1px solid var(--line);background:#fff;color:#334155;border-radius:999px;padding:9px 12px;font-size:13px;font-weight:800;cursor:pointer}
    .day-filter-btn.active{background:#eef4ff;color:#1d4ed8;border-color:#bfdbfe;box-shadow:0 8px 18px rgba(29,78,216,.12)}
    .task-status-pill{display:inline-flex;align-items:center;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:800;border:1px solid var(--line)}
    .task-status-pill.done{background:#dcfce7;color:#166534;border-color:#bbf7d0}.task-status-pill.pending{background:#fff7ed;color:#9a3412;border-color:#fed7aa}.task-status-pill.missing{background:#fee2e2;color:#991b1b;border-color:#fecaca}

    .old-task-filter{display:grid;grid-template-columns:repeat(2,minmax(0,1fr)) auto;gap:10px;align-items:end;background:#f8fafc;border:1px solid var(--line);border-radius:18px;padding:12px;margin:0 0 14px}
    .old-task-filter label{margin-bottom:6px}
    .old-task-filter input{min-height:44px;padding:10px 12px}
    .old-task-filter .filter-actions{display:flex;gap:8px;align-items:end}
    .old-task-count{margin:0 0 10px;color:var(--muted);font-size:13px;font-weight:700}
    .entry-action-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}

    @media(max-width:560px){
      .tabs{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;overflow:visible;padding:4px 0 12px}
      .tab{width:100%;white-space:normal;border-radius:16px;min-height:48px;text-align:center}
      .day-filter-strip{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;overflow:visible}
      .day-filter-btn{width:100%;white-space:normal;border-radius:16px;min-height:42px}
      .entry-action-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
      .entry-action-grid .btn{width:100%;padding-left:10px;padding-right:10px}
      .old-task-filter{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;padding:10px}
      .old-task-filter .filter-actions{grid-column:1/-1;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
      .old-task-filter .filter-actions .btn{width:100%}
    }

    /* Çalışma satırı sil butonu: telefon ekranında kaymayı engeller */
    .entry-row{
      position:relative;
      overflow:hidden;
      padding:18px 16px 16px;
    }
    .entry-row::before{
      content:"";
      position:absolute;
      left:0;
      top:0;
      bottom:0;
      width:4px;
      background:linear-gradient(180deg,#2563eb,#16a34a);
      opacity:.75;
    }
    .entry-row .row-title.entry-row-head{
      display:flex!important;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      min-height:42px;
      margin:0 0 14px;
      padding:0 96px 0 0;
    }
    .entry-row-title-block{
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .entry-row-title-block strong{
      color:#0f172a;
      font-size:15px;
      line-height:1.2;
    }
    .entry-row-title-block .mini{
      line-height:1.35;
    }
    .entry-delete-btn{
      position:absolute;
      top:14px;
      right:14px;
      z-index:3;
      min-height:38px;
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      box-shadow:0 10px 22px rgba(153,27,27,.14);
      white-space:nowrap;
    }
    .entry-delete-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 14px 26px rgba(153,27,27,.18);
    }
    .entry-delete-btn:active{
      transform:scale(.98);
    }
    @media(max-width:560px){
      .entry-row{
        padding:15px 12px 14px;
      }
      .entry-row .row-title.entry-row-head{
        min-height:42px;
        padding-right:82px;
        margin-bottom:14px;
      }
      .entry-row-title-block strong{
        font-size:14px;
      }
      .entry-delete-btn{
        top:12px;
        right:12px;
        min-height:36px;
        padding:8px 10px;
        font-size:12px;
      }
    }
  </style>
</head>
<body>
  <div id="loading" class="loading"><div><div class="spinner"></div><div id="loadingText">Yükleniyor...</div></div></div>

  <main class="app-shell">
    <section id="loginView" class="login-wrap">
      <div class="card login-card">
        <div class="login-logo">
          <img src="https://i.ibb.co/cS9PSRpq/Logo-Fenomen.jpg" alt="Fenomen Eğitim Kurumları Logosu" class="logo-img" decoding="async">
        </div>
        <h1 id="loginInstitution" class="login-title">Fenomen Eğitim Kurumları</h1>
        <p class="login-sub">Öğrenci çalışma, görev ve analiz paneli</p>
        <form id="loginForm">
          <label for="studentNoInput">Öğrenci No / Şifre</label>
          <input id="studentNoInput" inputmode="numeric" autocomplete="off" placeholder="Öğrenci numaranızı girin" required />
          <button class="btn btn-primary w-100" type="submit" style="margin-top:14px">Giriş Yap</button>
        </form>
        <div id="loginAlert" class="alert"></div>
        <div class="footer">Program Tasarımı: Ferhat Karagöz</div>
      </div>
    </section>

    <section id="appView" class="hidden">
      <div class="topbar">
        <div class="brand">
          <div class="logo-box"><img src="https://i.ibb.co/cS9PSRpq/Logo-Fenomen.jpg" alt="Fenomen Eğitim Kurumları Logosu" class="logo-img" decoding="async"></div>
          <div>
            <h1 id="appInstitution">Fenomen Eğitim Kurumları</h1>
            <p>Öğrenci çalışma takip paneli</p>
          </div>
        </div>
        <button class="btn btn-light" onclick="logout()">Çıkış</button>
      </div>

      <div class="card student-hero">
        <div>
          <h2 id="studentName">Öğrenci</h2>
          <div class="meta-row">
            <span id="studentNoPill" class="pill blue">No</span>
            <span id="studentClassPill" class="pill">Sınıf</span>
            <span id="weekPill" class="pill green">Hafta</span>
          </div>
        </div>
        <div class="meta-row">
          <span id="connectionPill" class="pill orange">Sistem hazır</span>
        </div>
      </div>

      <div id="summaryCards" class="grid grid-4"></div>

      <nav class="tabs" aria-label="Panel sekmeleri">
        <button class="tab active" data-tab="tasks" onclick="switchTab('tasks')">Görevler</button>
        <button class="tab" data-tab="entry" onclick="switchTab('entry')">Çalışma Girişi</button>
        <button class="tab" data-tab="analysis" onclick="switchTab('analysis')">Analizlerim</button>
        <button class="tab" data-tab="messages" onclick="switchTab('messages')">Öğretmen Mesajları</button>
      </nav>

      <section id="tabContent" class="card section-card"></section>
      <div class="footer">Program Tasarımı: Ferhat Karagöz</div>
    </section>
  </main>

    const DEFAULT_CFG = JSON.parse(JSON.stringify(CFG));
    let db = null;

    function simpleHash(text){
      let hash=0;
      const raw=safe(text);
      for(let i=0;i<raw.length;i++){hash=((hash<<5)-hash)+raw.charCodeAt(i); hash|=0;}
      return Math.abs(hash).toString(36);
    }

    function getDbBaseFromConfig(config=CFG.firebaseConfig){
      return safe(config.databaseURL || DEFAULT_CFG.firebaseConfig.databaseURL).replace(/\/+$/,'');
    }

    function applySystemSettings(system={}){
      const firebaseConfig = {...DEFAULT_CFG.firebaseConfig, ...(system.firebaseConfig || {})};
      const dbBase = safe(system.dbBase || system.databaseURL || firebaseConfig.databaseURL || DEFAULT_CFG.firebaseConfig.databaseURL).replace(/\/+$/,'');
      firebaseConfig.databaseURL = dbBase || DEFAULT_CFG.firebaseConfig.databaseURL;
      CFG.firebaseConfig = firebaseConfig;
      CFG.sheetId = safe(system.sheetId) || DEFAULT_CFG.sheetId;
      CFG.systemSettings = {
        firebaseEnabled: system.firebaseEnabled !== false,
        sheetsEnabled: system.sheetsEnabled !== false,
        smsEnabled: system.smsEnabled !== false,
        smsSignature: system.smsSignature || 'Fenomen',
        smsPrefix: system.smsPrefix || '',
        sheetId: CFG.sheetId,
        dbBase: firebaseConfig.databaseURL,
        firebaseConfig
      };
      if(typeof state !== 'undefined') state.systemSettings = CFG.systemSettings;
    }

    async function readJsonFromBase(base,path){
      const cleanBase=safe(base).replace(/\/+$/,'');
      const cleanPath=safe(path).replace(/^\/+|\/+$/g,'');
      const res = await fetch(`${cleanBase}/${cleanPath}.json?cb=${Date.now()}`, {cache:'no-store'});
      if(!res.ok) throw new Error(`Firebase ayarı okunamadı: HTTP ${res.status}`);
      return await res.json();
    }

    async function prepareRuntimeSettings(){
      applySystemSettings({});
      try{
        const system = await readJsonFromBase(DEFAULT_CFG.firebaseConfig.databaseURL, 'verianalizi002/sistemAyarlari');
        if(system) applySystemSettings(system);
      }catch(err){
        console.warn('Varsayılan sistem ayarları alınamadı, gömülü ayarlar kullanılacak:', err);
      }
      initRealtimeDb();
    }

    function getFirebaseApp(){
      if(!window.firebase) throw new Error('Firebase kütüphanesi yüklenemedi.');
      const cfg=CFG.firebaseConfig;
      const name=`fenomen_student_${simpleHash(`${cfg.databaseURL}|${cfg.projectId}|${cfg.appId}`)}`;
      let app=firebase.apps.find(a=>a.name===name);
      if(!app) app=firebase.initializeApp(cfg,name);
      return app;
    }

    function initRealtimeDb(){
      db = firebase.database(getFirebaseApp());
      return db;
    }

    function getDb(){
      return db || initRealtimeDb();
    }

    const state = {
      student:null,
      students:[],
      courses:DEFAULT_COURSES,
      limits:{minEntryPerCourse:1,maxEntryPerCourse:3,allowSameTopicAgain:true},
      records:[],
      assignments:[],
      messages:[],
      activeTab:'tasks', selectedTaskDay:'today', oldTaskStart:'', oldTaskEnd:'',
      listeners:[],
      systemSettings:{firebaseEnabled:true,sheetsEnabled:true,smsEnabled:true,sheetId:CFG.sheetId,dbBase:CFG.firebaseConfig.databaseURL,firebaseConfig:CFG.firebaseConfig}
    };

    document.addEventListener('DOMContentLoaded', async()=>{
      bindLogin();
      await prepareRuntimeSettings();
      await loadPublicSettings();
      const savedNo = localStorage.getItem('fenomenStudentNo');
      if(savedNo){
        document.getElementById('studentNoInput').value = savedNo;
        await loginStudent(savedNo, true);
      }
    });

    function bindLogin(){
      document.getElementById('loginForm').addEventListener('submit', async e=>{
        e.preventDefault();
        const no = safe(document.getElementById('studentNoInput').value).replace(/\D/g,'');
        await loginStudent(no, false);
      });
    }

    async function loadPublicSettings(){
      try{
        const systemSnap = await getDb().ref('verianalizi002/sistemAyarlari').once('value');
        if(systemSnap.val()){
          const before = getDbBaseFromConfig();
          applySystemSettings(systemSnap.val());
          if(before !== getDbBaseFromConfig()) initRealtimeDb();
        }
      }catch(err){
        console.warn('Aktif sistem ayarları alınamadı:', err);
      }
      try{
        const kurumSnap = await getDb().ref('verianalizi002/kurumAyarlari').once('value');
        const kurum = kurumSnap.val() || {};
        const kurumAdi = safe(kurum.kurumAdi) || CFG.defaultInstitution;
        document.getElementById('loginInstitution').textContent = kurumAdi;
        document.getElementById('appInstitution').textContent = kurumAdi;
        if(kurum.logoUrl){
          document.querySelectorAll('.logo-img').forEach(img=>{ img.src = kurum.logoUrl; });
        }

        const limitSnap = await getDb().ref('verianalizi002/ayarlar/gunlukGirisLimitleri').once('value');
        state.limits = {...state.limits, ...(limitSnap.val() || {})};

        const konuSnap = await getDb().ref('verianalizi002/lgsKonulari').once('value');
        const remoteCourses = normalizeCourses(konuSnap.val());
        if(remoteCourses.length) state.courses = remoteCourses;
      }catch(err){
        console.warn('Ayarlar alınamadı:', err);
      }
    }

    async function loginStudent(no, silent){
      hideAlert('loginAlert');
      if(!no){ showAlert('loginAlert','Öğrenci numarası yazmalısın.','bad'); return; }
      setLoading(true,'Öğrenci bilgileri kontrol ediliyor...');
      try{
        if(!state.students.length) state.students = await loadStudentsFromConfiguredSources();
        const student = state.students.find(s=>safe(s.no) === safe(no));
        if(!student){
          if(!silent) showAlert('loginAlert','Bu öğrenci numarası tabloda bulunamadı.','bad');
          setLoading(false);
          return;
        }
        state.student = student;
        localStorage.setItem('fenomenStudentNo', student.no);
        openApp();
        attachStudentListeners();
      }catch(err){
        showAlert('loginAlert','Giriş yapılamadı. E-tablo erişimini ve internet bağlantısını kontrol et.','bad');
        console.error(err);
      }finally{
        setLoading(false);
      }
    }

    async function loadStudentsFromConfiguredSources(){
      let list = [];
      if(state.systemSettings?.sheetsEnabled !== false){
        try{ list = await fetchStudentsFromSheet(); }
        catch(err){ console.warn('E-Tablo öğrenci listesi alınamadı, Firebase yedeği denenecek:', err); }
      }
      if(!list.length){
        try{ list = await fetchStudentsFromFirebase(); }
        catch(err){ console.warn('Firebase öğrenci yedeği alınamadı:', err); }
      }
      return list;
    }

    async function fetchStudentsFromFirebase(){
      const snap = await getDb().ref('verianalizi002/ogrenciler').once('value');
      const raw = snap.val() || {};
      const arr = Array.isArray(raw) ? raw : Object.values(raw);
      return arr.map(o=>({
        no: cleanId(o.no || o.id || o.ogrenciNo || o.ÖĞRENCİ_NO || o.NO),
        adsoyad: o.adsoyad || o.adSoyad || o.name || o.ogrenciAdi || o.ÖĞRENCİ_ADI || '',
        sinif: o.sinif || o.sınıf || o.className || o.SINIF || '',
        grup: o.grup || o.group || '',
        veliTel: o.veliTel || o.telefon || o.tel || '',
        veliMail: o.veliMail || o.email || ''
      })).filter(s=>s.no && s.adsoyad);
    }

    async function fetchStudentsFromSheet(){
      if(state.systemSettings?.sheetsEnabled === false) throw new Error('Admin ayarında E-Tablo kapalı.');
      const table = await fetchGviz(CFG.studentSheet);
      const headers = table.cols.map(c=>normalizeHeader(c.label || c.id || ''));
      return table.rows.map(row=>{
        const obj = {};
        headers.forEach((h,i)=> obj[h] = cellToString(row.c[i]));
        return {
          no: cleanId(obj.no || obj.id || obj.ogrencino || obj.öğrencino),
          adsoyad: obj.adsoyad || obj.ad || obj.ogrenciadi || '',
          sinif: obj.sinif || obj.sınıf || '',
          grup: obj.grup || '',
          veliTel: obj.velitel || obj.velitelefon || obj.telefon || '',
          veliMail: obj.velimail || obj.velieposta || obj.email || ''
        };
      }).filter(s=>s.no && s.adsoyad);
    }

    async function fetchGviz(sheetName){
      const base = `https://docs.google.com/spreadsheets/d/${CFG.sheetId}/gviz/tq?sheet=${encodeURIComponent(sheetName)}&headers=1&tqx=out:json`;
      try{
        const txt = await fetch(`${base}&cb=${Date.now()}`, {cache:'no-store'}).then(r=>r.text());
        return parseGvizText(txt);
      }catch(err){
        return fetchGvizJsonp(sheetName);
      }
    }

    function fetchGvizJsonp(sheetName){
      return new Promise((resolve,reject)=>{
        const cb = `__gviz_cb_${Date.now()}_${Math.floor(Math.random()*9999)}`;
        const script = document.createElement('script');
        window[cb] = data => { cleanup(); resolve(data.table); };
        function cleanup(){ delete window[cb]; script.remove(); }
        script.onerror = () => { cleanup(); reject(new Error('Google E-Tablo JSONP erişimi başarısız.')); };
        script.src = `https://docs.google.com/spreadsheets/d/${CFG.sheetId}/gviz/tq?sheet=${encodeURIComponent(sheetName)}&headers=1&tqx=out:json;responseHandler:${cb}&cb=${Date.now()}`;
        document.body.appendChild(script);
      });
    }

    function parseGvizText(txt){
      const start = txt.indexOf('{');
      const end = txt.lastIndexOf('}');
      if(start < 0 || end < 0) throw new Error('E-tablo yanıtı okunamadı.');
      const json = JSON.parse(txt.slice(start,end+1));
      return json.table;
    }

    function openApp(){
      document.getElementById('loginView').classList.add('hidden');
      document.getElementById('appView').classList.remove('hidden');
      document.getElementById('studentName').textContent = state.student.adsoyad;
      document.getElementById('studentNoPill').textContent = `No: ${state.student.no}`;
      document.getElementById('studentClassPill').textContent = `Sınıf: ${state.student.sinif || '-'}`;
      renderActiveDatePill();
      const cPill = document.getElementById('connectionPill');
      if(cPill) cPill.textContent = `Admin ayarları aktif •`;
      renderAll();
    }

    function renderActiveDatePill(){
      const pill = document.getElementById('weekPill');
      if(!pill || !state.student) return;
      const latestRange = latestActiveAssignmentRange();
      if(!latestRange || !latestRange.startKey){
        pill.textContent = `Aktif Tarih: ${formatDateTR(new Date())}`;
        return;
      }
      const startText = formatDateTR(parseDateKey(latestRange.startKey));
      const endText = latestRange.endKey && latestRange.endKey !== latestRange.startKey ? ` - ${formatDateTR(parseDateKey(latestRange.endKey))}` : '';
      pill.textContent = `Aktif Tarih: ${startText}${endText}`;
    }

    function latestActiveAssignmentRange(){
      const ranges = relevantAssignments()
        .map(a=>assignmentDateRange(a))
        .filter(range=>range.startKey);
      ranges.sort((a,b)=>{
        const aEnd = a.endKey || a.startKey;
        const bEnd = b.endKey || b.startKey;
        return bEnd.localeCompare(aEnd) || b.startKey.localeCompare(a.startKey);
      });
      return ranges[0] || null;
    }

    function assignmentDateRange(a){
      const days = Object.keys(normalizeAssignmentDays(a)).map(normalizeTaskDateKey).filter(Boolean).sort();
      let startKey = normalizeTaskDateKey(a.startDate || a.start || a.baslangicTarihi || a['başlangıçTarihi'] || a.baslangic || a['başlangıç'] || '') || days[0] || '';
      let endKey = normalizeTaskDateKey(a.endDate || a.end || a.bitisTarihi || a['bitişTarihi'] || a.bitis || a['bitiş'] || '') || days[days.length - 1] || startKey;
      if(startKey && endKey && startKey > endKey){
        const tmp = startKey;
        startKey = endKey;
        endKey = tmp;
      }
      return {startKey,endKey};
    }

    function attachStudentListeners(){
      detachListeners();
      const no = state.student.no;
      const recordsRef = getDb().ref(`verianalizi001/calismaKayitlari/${no}`);
      const assignRef = getDb().ref('verianalizi001/haftalikGorevler');
      const msgRef = getDb().ref(`verianalizi001/ogrenciMesajlari/${no}`);

      recordsRef.on('value', snap=>{
        const val = snap.val() || {};
        state.records = Object.entries(val).map(([id,v])=>({id,...v})).sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));
        renderAll();
      });
      assignRef.on('value', snap=>{
        const val = snap.val() || {};
        state.assignments = Object.entries(val).map(([id,v])=>({id,...v}));
        renderAll();
      });
      msgRef.on('value', snap=>{
        const val = snap.val() || {};
        state.messages = Object.entries(val).map(([id,v])=>({id,...v})).sort((a,b)=>(b.timestamp||0)-(a.timestamp||0));
        renderAll();
      });
      state.listeners = [[recordsRef,'value'],[assignRef,'value'],[msgRef,'value']];
    }

    function detachListeners(){
      state.listeners.forEach(([ref,event])=>ref.off(event));
      state.listeners = [];
    }

    function logout(){
      detachListeners();
      localStorage.removeItem('fenomenStudentNo');
      state.student = null;
      state.records = [];
      state.assignments = [];
      state.messages = [];
      state.selectedTaskDay = 'today';
      state.oldTaskStart = '';
      state.oldTaskEnd = '';
      document.getElementById('appView').classList.add('hidden');
      document.getElementById('loginView').classList.remove('hidden');
      document.getElementById('studentNoInput').value = '';
    }

    function switchTab(tab){
      state.activeTab = tab;
      document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active', b.dataset.tab === tab));
      renderTab();
    }

    function renderAll(){
      if(!state.student) return;
      renderActiveDatePill();
      renderSummaryCards();
      renderTab();
    }

    function renderSummaryCards(){
      const today = dateKey(new Date());
      const week = getWeekRange(new Date());
      const todayRecords = state.records.filter(r=>r.dateKey === today);
      const weekRecords = state.records.filter(r=>inDateRange(r.dateKey, dateKey(week.start), dateKey(week.end)));
      const unread = state.messages.filter(m=>!m.okundu).length;
      const taskStatus = calculateTaskStatus();
      const html = `
        ${statCard('Bugünkü Soru', sumField(todayRecords,'toplamSoru'), 'Toplam girilen soru')}
        ${statCard('7 Gün', sumField(weekRecords,'toplamSoru'), 'Bugünden başlayan')}
        ${statCard('Görev Durumu', `${taskStatus.done}/${taskStatus.total}`, 'Tamamlanan görev')}
        ${statCard('Mesaj', unread, 'Okunmamış öğretmen mesajı')}
      `;
      document.getElementById('summaryCards').innerHTML = html;
    }

    function statCard(title,value,sub){
      return `<div class="stat-card"><span>${escapeHtml(title)}</span><strong>${escapeHtml(String(value || 0))}</strong><div class="mini">${escapeHtml(sub)}</div></div>`;
    }

    function renderTab(){
      const target = document.getElementById('tabContent');
      if(state.activeTab === 'tasks') target.innerHTML = renderTasks();
      if(state.activeTab === 'entry') target.innerHTML = renderEntry();
      if(state.activeTab === 'analysis') target.innerHTML = renderAnalysis();
      if(state.activeTab === 'messages') target.innerHTML = renderMessages();
      if(state.activeTab === 'entry') setTimeout(()=>addEntryRow({}, false),0);
    }

    function renderTasks(){
      const list = relevantAssignments();
      const today = dateKey(new Date());
      const allDays = [...new Set(list.flatMap(a=>Object.keys(normalizeAssignmentDays(a)).map(normalizeTaskDateKey).filter(d=>d && d >= today)))].sort();
      if(!state.selectedTaskDay) state.selectedTaskDay = allDays.includes(today) ? today : 'all';
      if(state.selectedTaskDay !== 'all' && !allDays.includes(state.selectedTaskDay)) state.selectedTaskDay = allDays.includes(today) ? today : 'all';
      const filter = allDays.length ? `<div class="day-filter-strip"><button class="day-filter-btn ${state.selectedTaskDay==='all'?'active':''}" onclick="setTaskDay('all')">Tümü</button>${allDays.map(d=>`<button class="day-filter-btn ${state.selectedTaskDay===d?'active':''}" onclick="setTaskDay('${d}')">${formatDateTR(parseDateKey(d))}</button>`).join('')}</div>` : '';
      const head = `
        <div class="section-head">
          <div><h3>Haftalık Görevlendirmeler</h3><p>Normal ekranda yalnızca bugün ve ileri tarihli görevler görünür. Gün filtresi de bugün ve sonrası için çalışır.</p></div>
        </div>${filter}`;
      const currentHtml = list.map(a=>assignmentHtml(a,state.selectedTaskDay, day=>normalizeTaskDateKey(day) >= today)).join('');
      const currentBlock = currentHtml || `<div class="empty">Bugün veya ileri tarihli tanımlı görev görünmüyor.</div>`;
      return head + currentBlock + oldAssignmentsHtml(list);
    }

    function setTaskDay(day){ state.selectedTaskDay = day; renderTab(); }

    function setOldTaskDateFilter(field,value){
      const normalized = normalizeTaskDateKey(value);
      if(field === 'start') state.oldTaskStart = normalized;
      if(field === 'end') state.oldTaskEnd = normalized;
      renderTab();
    }

    function clearOldTaskDateFilter(){
      state.oldTaskStart = '';
      state.oldTaskEnd = '';
      renderTab();
    }

    function assignmentHtml(a, selectedDay='all', dayFilter=()=>true){
      const start = a.startDate || a.baslangicTarihi || '';
      const end = a.endDate || a.bitisTarihi || '';
      const days = normalizeAssignmentDays(a);
      const keys = Object.keys(days).sort((x,y)=>normalizeTaskDateKey(x).localeCompare(normalizeTaskDateKey(y))).filter(day=>{
        const normalizedDay = normalizeTaskDateKey(day);
        return dayFilter(day) && (selectedDay==='all' || selectedDay===normalizedDay);
      });
      const dayHtml = keys.map(day=>{
        const normalizedDay = normalizeTaskDateKey(day);
        const items = days[day];
        const lines = items.map(item=>taskItemHtml(normalizedDay,item)).join('');
        return `<div class="task-card"><div class="task-top"><div><p class="task-title">${formatDateTR(parseDateKey(normalizedDay))}</p><p class="task-sub">${escapeHtml(dayNameTR(normalizedDay))}</p></div></div>${lines}</div>`;
      }).join('');
      if(!dayHtml) return '';
      return `
        <article class="task-card">
          <div class="task-top">
            <div>
              <p class="task-title">${escapeHtml(a.title || a.baslik || 'Çalışma Programı')}</p>
              <p class="task-sub">${escapeHtml(start)} ${end ? ' - ' + escapeHtml(end) : ''}</p>
            </div>
            <span class="pill blue">${escapeHtml(targetLabel(a))}</span>
          </div>
          ${dayHtml || '<div class="empty">Bu görevde gün içeriği bulunmuyor.</div>'}
        </article>`;
    }

    function oldAssignmentsHtml(list){
      const today = dateKey(new Date());
      const allOldDays = [];
      list.forEach(a=>{
        const days = normalizeAssignmentDays(a);
        Object.entries(days).forEach(([day,items])=>{
          const normalizedDay = normalizeTaskDateKey(day);
          if(normalizedDay && normalizedDay < today){
            allOldDays.push({assignment:a, day:normalizedDay, items:normalizeDayItems(items)});
          }
        });
      });
      allOldDays.sort((a,b)=>b.day.localeCompare(a.day) || safe(a.assignment.title || a.assignment.baslik).localeCompare(safe(b.assignment.title || b.assignment.baslik),'tr'));
      if(!allOldDays.length){
        return `
          <div style="height:14px"></div>
          <div class="section-head">
            <div><h3>Geçmiş Görevlendirmeler</h3><p>Günü geçen görevlendirmeler burada tarih filtresiyle listelenir.</p></div>
          </div>
          <div class="empty">Henüz geçmiş görevlendirme bulunmuyor.</div>`;
      }

      const rawStart = state.oldTaskStart || '';
      const rawEnd = state.oldTaskEnd || '';
      const filterStart = rawStart && rawEnd && rawStart > rawEnd ? rawEnd : rawStart;
      const filterEnd = rawStart && rawEnd && rawStart > rawEnd ? rawStart : rawEnd;
      const oldDays = allOldDays.filter(entry=>(!filterStart || entry.day >= filterStart) && (!filterEnd || entry.day <= filterEnd));
      const filterHtml = `
        <div class="old-task-filter">
          <div>
            <label for="oldTaskStart">Başlangıç Tarihi</label>
            <input id="oldTaskStart" type="date" value="${escapeHtml(rawStart)}" onchange="setOldTaskDateFilter('start', this.value)">
          </div>
          <div>
            <label for="oldTaskEnd">Bitiş Tarihi</label>
            <input id="oldTaskEnd" type="date" value="${escapeHtml(rawEnd)}" onchange="setOldTaskDateFilter('end', this.value)">
          </div>
          <div class="filter-actions">
            <button class="btn btn-light" type="button" onclick="clearOldTaskDateFilter()">Filtreyi Temizle</button>
          </div>
        </div>
        <p class="old-task-count">${oldDays.length}/${allOldDays.length} geçmiş görev gösteriliyor.</p>`;

      return `
        <div style="height:14px"></div>
        <div class="section-head">
          <div><h3>Geçmiş Görevlendirmeler</h3><p>Günü geçen görevlendirmeler burada listelenir. Başlangıç ve bitiş tarihi seçerek eski görevleri süzebilirsin.</p></div>
        </div>
        ${filterHtml}
        ${oldDays.length ? oldDays.map(entry=>{
          const a = entry.assignment;
          const lines = entry.items.map(item=>taskItemHtml(entry.day,item)).join('');
          return `<article class="task-card">
            <div class="task-top">
              <div>
                <p class="task-title">${formatDateTR(parseDateKey(entry.day))} • ${escapeHtml(a.title || a.baslik || 'Çalışma Programı')}</p>
                <p class="task-sub">${escapeHtml(dayNameTR(entry.day))} • ${escapeHtml(targetLabel(a))}</p>
              </div>
              <span class="pill orange">Geçmiş Görev</span>
            </div>
            ${lines || '<div class="empty">Bu geçmiş görevde içerik bulunmuyor.</div>'}
          </article>`;
        }).join('') : '<div class="empty">Seçilen tarih aralığında geçmiş görev bulunmuyor.</div>'}`;
    }

    function taskItemHtml(day,item){
      const taskDay = normalizeTaskDateKey(day);
      const today = dateKey(new Date());
      const ders = item.ders || item.course || '';
      const hedef = Number(item.soruSayisi || item.soru || item.hedefSoru || item.total || 0);
      const done = state.records.filter(r=>normalizeTaskDateKey(r.dateKey) === taskDay && safe(r.ders) === safe(ders)).reduce((a,r)=>a+Number(r.toplamSoru||0),0);
      const remaining = Math.max(hedef - done, 0);
      const pct = hedef ? Math.min(100, Math.round(done/hedef*100)) : 0;
      const ok = hedef && done >= hedef;
      const isPast = taskDay < today;
      const statusClass = ok ? 'done' : (isPast ? 'missing' : 'pending');
      const statusText = ok ? 'Yapıldı' : (isPast ? `Eksik: ${remaining} soru` : 'Devam');
      const remainingText = hedef && !ok ? ` • Kalan: ${remaining} soru` : '';
      return `
        <div class="task-line">
          <div>
            <strong>${escapeHtml(ders || 'Ders')}</strong>
            <div class="mini">Hedef: ${hedef} soru • Girilen: ${done} soru${remainingText} ${item.anaKonu ? '• ' + escapeHtml(item.anaKonu) : ''}</div>
            ${item.aciklama ? `<div class="mini">${escapeHtml(item.aciklama)}</div>` : ''}
            <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
          </div>
          <span class="task-status-pill ${statusClass}">${statusText}</span>
        </div>`;
    }

    function renderEntry(){
      return `
        <div class="section-head">
          <div><h3>Günlük Çalışma Girişi</h3><p>Toplam soru, yanlış ve boş girilir. Doğru sayısı sistem tarafından hesaplanır.</p></div>
          <span class="pill blue">Ders başına en fazla ${Number(state.limits.maxEntryPerCourse || 3)} giriş</span>
        </div>
        <div id="entryRows"></div>
        <div class="entry-action-grid">
          <button class="btn btn-light" onclick="addEntryRow({}, true)">+ Satır Ekle</button>
          <button class="btn btn-primary" onclick="saveEntries()">Çalışmaları Kaydet</button>
        </div>
        <div id="entryAlert" class="alert"></div>`;
    }

    function addEntryRow(prefill={}, scrollAfter=true){
      const rows = document.getElementById('entryRows');
      if(!rows) return;
      const id = `row_${Date.now()}_${Math.floor(Math.random()*9999)}`;
      const courseOptions = state.courses.map(c=>`<option value="${escapeHtml(c.ad)}">${escapeHtml(c.ad)}</option>`).join('');
      const html = document.createElement('div');
      html.className = 'entry-row';
      html.dataset.rowId = id;
      html.innerHTML = `
        <div class="row-title entry-row-head"><div class="entry-row-title-block"><strong>Çalışma Satırı</strong><span class="mini">Ders, konu ve soru bilgisi</span></div><button type="button" class="btn btn-danger entry-delete-btn" onclick="removeEntryRow(this)" aria-label="Bu çalışma satırını sil">🗑 Sil</button></div>
        <div class="grid grid-3">
          <div><label>Ders</label><select class="entry-course" onchange="updateTopicSelects(this)">${courseOptions}</select></div>
          <div><label>Ana Konu</label><select class="entry-main" onchange="updateSubTopicSelect(this)"></select></div>
          <div><label>Alt Konu</label><select class="entry-sub"></select></div>
        </div>
        <div class="grid grid-3" style="margin-top:12px">
          <div><label>Toplam Soru</label><input class="entry-total" type="number" min="0" inputmode="numeric" placeholder="0"></div>
          <div><label>Yanlış</label><input class="entry-wrong" type="number" min="0" inputmode="numeric" placeholder="0"></div>
          <div><label>Boş</label><input class="entry-blank" type="number" min="0" inputmode="numeric" placeholder="0"></div>
        </div>`;
      rows.appendChild(html);
      const course = html.querySelector('.entry-course');
      if(prefill.ders) course.value = prefill.ders;
      updateTopicSelects(course);
      if(scrollAfter){
        requestAnimationFrame(()=>{
          const top = html.getBoundingClientRect().top + window.pageYOffset - 88;
          window.scrollTo({top: Math.max(0, top), behavior: 'smooth'});
        });
      }
    }

    function removeEntryRow(btn){
      const row = btn.closest('.entry-row');
      if(row) row.remove();
    }

    function updateTopicSelects(courseSelect){
      const row = courseSelect.closest('.entry-row');
      const course = state.courses.find(c=>c.ad === courseSelect.value) || state.courses[0];
      const main = row.querySelector('.entry-main');
      main.innerHTML = (course.anaKonular || []).map(k=>`<option value="${escapeHtml(k.ad)}">${escapeHtml(k.ad)}</option>`).join('');
      updateSubTopicSelect(main);
    }

    function updateSubTopicSelect(mainSelect){
      const row = mainSelect.closest('.entry-row');
      const courseName = row.querySelector('.entry-course').value;
      const course = state.courses.find(c=>c.ad === courseName) || state.courses[0];
      const main = (course.anaKonular || []).find(k=>k.ad === mainSelect.value) || (course.anaKonular || [])[0] || {altKonular:[]};
      const sub = row.querySelector('.entry-sub');
      sub.innerHTML = (main.altKonular || [main.ad].filter(Boolean)).map(k=>`<option value="${escapeHtml(k)}">${escapeHtml(k)}</option>`).join('');
    }

    async function saveEntries(){
      hideAlert('entryAlert');
      const rows = [...document.querySelectorAll('.entry-row')];
      if(!rows.length){ showAlert('entryAlert','En az bir çalışma satırı eklemelisin.','bad'); return; }
      const items = rows.map(row=>{
        const ders = row.querySelector('.entry-course').value;
        const anaKonu = row.querySelector('.entry-main').value;
        const altKonu = row.querySelector('.entry-sub').value;
        const toplamSoru = toNum(row.querySelector('.entry-total').value);
        const yanlis = toNum(row.querySelector('.entry-wrong').value);
        const bos = toNum(row.querySelector('.entry-blank').value);
        const dogru = toplamSoru - yanlis - bos;
        return {ders,anaKonu,altKonu,toplamSoru,yanlis,bos,dogru};
      });
      const validation = validateEntries(items);
      if(!validation.ok){ showAlert('entryAlert', validation.message, 'bad'); return; }
      setLoading(true,'Çalışmalar kaydediliyor...');
      try{
        const now = new Date();
        const updates = {};
        items.forEach(item=>{
          const key = getDb().ref(`verianalizi001/calismaKayitlari/${state.student.no}`).push().key;
          updates[`verianalizi001/calismaKayitlari/${state.student.no}/${key}`] = {
            ogrenciNo: state.student.no,
            adsoyad: state.student.adsoyad,
            sinif: state.student.sinif || '',
            grup: state.student.grup || '',
            ...item,
            dateKey: dateKey(now),
            tarih: formatDateTR(now),
            saat: now.toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}),
            timestamp: now.getTime(),
            createdAt: now.toISOString(),
            source: 'student-web'
          };
        });
        updates[`verianalizi001/ogrenciOzetleri/${state.student.no}/sonGuncelleme`] = new Date().toISOString();
        updates[`verianalizi001/ogrenciOzetleri/${state.student.no}/adsoyad`] = state.student.adsoyad;
        updates[`verianalizi001/ogrenciOzetleri/${state.student.no}/sinif`] = state.student.sinif || '';
        await getDb().ref().update(updates);
        document.getElementById('entryRows').innerHTML = '';
        addEntryRow({}, false);
        showAlert('entryAlert','Çalışmalar başarıyla kaydedildi.','ok');
      }catch(err){
        console.error(err);
        showAlert('entryAlert','Kayıt sırasında hata oluştu. Firebase bağlantısını kontrol et.','bad');
      }finally{
        setLoading(false);
      }
    }

    function validateEntries(items){
      const max = Number(state.limits.maxEntryPerCourse || 3);
      const countByCourse = {};
      for(const it of items){
        if(!it.ders || !it.anaKonu || !it.altKonu) return {ok:false,message:'Ders, ana konu ve alt konu seçimi zorunludur.'};
        if(it.toplamSoru <= 0) return {ok:false,message:'Toplam soru sayısı 0’dan büyük olmalıdır.'};
        if(it.yanlis < 0 || it.bos < 0) return {ok:false,message:'Yanlış ve boş değerleri negatif olamaz.'};
        if(it.dogru < 0) return {ok:false,message:'Yanlış + boş sayısı toplam soru sayısından fazla olamaz.'};
        countByCourse[it.ders] = (countByCourse[it.ders] || 0) + 1;
        if(countByCourse[it.ders] > max) return {ok:false,message:`${it.ders} için aynı anda en fazla ${max} giriş yapılabilir.`};
      }
      return {ok:true};
    }

    function renderAnalysis(){
      const today = dateKey(new Date());
      const week = getWeekRange(new Date());
      const monthStart = new Date(); monthStart.setDate(1); monthStart.setHours(0,0,0,0);
      const todayRecords = state.records.filter(r=>r.dateKey === today);
      const weekRecords = state.records.filter(r=>inDateRange(r.dateKey, dateKey(week.start), dateKey(week.end)));
      const monthRecords = state.records.filter(r=>inDateRange(r.dateKey, dateKey(monthStart), dateKey(new Date())));
      return `
        <div class="section-head">
          <div><h3>Analizlerim</h3><p>Çalışma özetlerin tarih aralıklarına göre hesaplanır.</p></div>
        </div>
        <div class="grid grid-3">
          ${smallAnalysisBox('Bugün', todayRecords)}
          ${smallAnalysisBox('Bu Hafta', weekRecords)}
          ${smallAnalysisBox('Bu Ay', monthRecords)}
        </div>
        <div style="height:14px"></div>
        <h3 style="margin:0 0 12px;font-size:18px">Derslere Göre Bu Hafta</h3>
        ${courseAnalysisHtml(weekRecords)}
        <div style="height:14px"></div>
        <h3 style="margin:0 0 12px;font-size:18px">Son Kayıtlarım</h3>
        ${lastRecordsHtml()}`;
    }

    function smallAnalysisBox(title,records){
      return `<div class="stat-card"><span>${escapeHtml(title)}</span><strong>${sumField(records,'toplamSoru')}</strong><div class="mini">Doğru: ${sumField(records,'dogru')} • Yanlış: ${sumField(records,'yanlis')} • Boş: ${sumField(records,'bos')}</div></div>`;
    }

    function courseAnalysisHtml(records){
      if(!records.length) return `<div class="empty">Bu hafta henüz çalışma kaydı yok.</div>`;
      const by = groupBy(records, r=>r.ders || 'Diğer');
      const max = Math.max(...Object.values(by).map(arr=>sumField(arr,'toplamSoru')),1);
      return `<div class="analysis-list">${Object.entries(by).map(([course,arr])=>{
        const total = sumField(arr,'toplamSoru');
        const pct = Math.round(total/max*100);
        return `<div class="course-line"><div class="course-line-top"><strong>${escapeHtml(course)}</strong><span>${total} soru</span></div><div class="mini">Doğru: ${sumField(arr,'dogru')} • Yanlış: ${sumField(arr,'yanlis')} • Boş: ${sumField(arr,'bos')}</div><div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div></div>`;
      }).join('')}</div>`;
    }

    function lastRecordsHtml(){
      const recent = state.records.slice(0,8);
      if(!recent.length) return `<div class="empty">Henüz kayıt bulunmuyor.</div>`;
      return recent.map(r=>`<div class="task-line"><div><strong>${escapeHtml(r.ders)} • ${escapeHtml(r.anaKonu || '')}</strong><div class="mini">${escapeHtml(r.tarih || r.dateKey)} ${escapeHtml(r.saat || '')} • Toplam: ${r.toplamSoru||0} • Doğru: ${r.dogru||0} • Yanlış: ${r.yanlis||0} • Boş: ${r.bos||0}</div></div><span class="pill blue">${escapeHtml(r.altKonu || 'Kayıt')}</span></div>`).join('');
    }

    function renderMessages(){
      const head = `<div class="section-head"><div><h3>Öğretmen Mesajları</h3><p>Öğretmeninin öğrenci paneline gönderdiği bilgilendirmeler burada görünür.</p></div></div>`;
      if(!state.messages.length) return head + `<div class="empty">Henüz öğretmen mesajı bulunmuyor.</div>`;
      return head + state.messages.map(m=>`
        <article class="message-card ${m.okundu ? '' : 'unread'}">
          <p class="message-title">${escapeHtml(m.baslik || 'Bilgilendirme')}</p>
          <p class="message-text">${escapeHtml(m.mesaj || '')}</p>
          <div class="meta-row">
            <span class="pill">${escapeHtml(m.tarih || '')} ${escapeHtml(m.saat || '')}</span>
            ${m.okundu ? '<span class="pill green">Okundu</span>' : `<button class="btn btn-light" onclick="markMessageRead('${m.id}')">Okundu Yap</button>`}
          </div>
        </article>`).join('');
    }

    async function markMessageRead(id){
      if(!state.student || !id) return;
      await getDb().ref(`verianalizi001/ogrenciMesajlari/${state.student.no}/${id}`).update({okundu:true, okunduAt:new Date().toISOString()});
    }

    function relevantAssignments(){
      const st = state.student;
      return state.assignments.filter(a=>{
        if(a.active === false || a.aktif === false || a.status === 'silindi') return false;
        const type = safe(a.targetType || a.hedefTuru || a.target?.type || 'all').toLowerCase();
        const val = safe(a.targetValue || a.hedefDegeri || a.target?.value || '');
        const studentNos = Array.isArray(a.studentNos) ? a.studentNos.map(cleanId) : Array.isArray(a.ogrenciler) ? a.ogrenciler.map(cleanId) : [];
        const targetOk = type === 'all' || type === 'genel' || val === 'all' ||
          (['class','sinif','sınıf'].includes(type) && safe(st.sinif) === val) ||
          (['group','grup'].includes(type) && safe(st.grup) === val) ||
          (['student','students','ogrenci','öğrenci'].includes(type) && (safe(st.no) === cleanId(val) || studentNos.includes(cleanId(st.no))));
        return targetOk;
      }).sort((a,b)=>firstAssignmentDate(a).localeCompare(firstAssignmentDate(b)));
    }

    function firstAssignmentDate(a){
      const days = Object.keys(normalizeAssignmentDays(a)).map(normalizeTaskDateKey).filter(Boolean).sort();
      return days[0] || normalizeTaskDateKey(a.startDate || a.start || a.baslangicTarihi || '') || '';
    }

    function normalizeAssignmentDays(a){
      const raw = a.days || a.gunler || a.program || a.daysObj || a.daysObject || {};
      const out = {};
      if(Array.isArray(raw)){
        raw.forEach(d=>{ if(d.date || d.tarih) out[d.date || d.tarih] = normalizeDayItems(d.items || d.gorevler || []); });
        return out;
      }
      Object.entries(raw).forEach(([date,val])=> out[date] = normalizeDayItems(val));
      return out;
    }

    function normalizeDayItems(val){
      if(Array.isArray(val)) return val;
      if(Array.isArray(val.items)) return val.items;
      if(Array.isArray(val.gorevler)) return val.gorevler;
      if(typeof val === 'object' && val) return Object.values(val);
      return [];
    }

    function calculateTaskStatus(){
      let total = 0, done = 0;
      const today = dateKey(new Date());
      relevantAssignments().forEach(a=>{
        const days = normalizeAssignmentDays(a);
        Object.entries(days).forEach(([day,items])=>{
          const normalizedDay = normalizeTaskDateKey(day);
          if(!normalizedDay || normalizedDay < today) return;
          items.forEach(item=>{
            const hedef = Number(item.soruSayisi || item.soru || item.hedefSoru || item.total || 0);
            if(!hedef) return;
            total++;
            const ders = item.ders || item.course || '';
            const got = state.records.filter(r=>normalizeTaskDateKey(r.dateKey) === normalizedDay && safe(r.ders) === safe(ders)).reduce((acc,r)=>acc+Number(r.toplamSoru||0),0);
            if(got >= hedef) done++;
          });
        });
      });
      return {total,done};
    }

    function targetLabel(a){
      const type = safe(a.targetType || a.hedefTuru || a.target?.type || 'all').toLowerCase();
      const val = a.targetValue || a.hedefDegeri || a.target?.value || '';
      if(type === 'all' || type === 'genel') return 'Tüm Öğrenciler';
      if(['class','sinif','sınıf'].includes(type)) return `Sınıf: ${val}`;
      if(['group','grup'].includes(type)) return `Grup: ${val}`;
      if(['student','students','ogrenci','öğrenci'].includes(type)){
        const nos = Array.isArray(a.studentNos) ? a.studentNos.map(cleanId) : [];
        return nos.length > 1 ? `${nos.length} Öğrenci` : `Öğrenci: ${val || nos[0] || ''}`;
      }
      return 'Görev';
    }

    function normalizeCourses(raw){
      if(!raw) return [];
      const arr = Array.isArray(raw) ? raw : Object.values(raw);
      return arr.map(c=>({
        ad: c.ad || c.name || c.ders || '',
        anaKonular: normalizeMainTopics(c.anaKonular || c.konular || c.topics || [])
      })).filter(c=>c.ad && c.anaKonular.length);
    }

    function normalizeMainTopics(raw){
      const arr = Array.isArray(raw) ? raw : Object.values(raw || {});
      return arr.map(k=>({
        ad: k.ad || k.name || k.konu || '',
        altKonular: Array.isArray(k.altKonular) ? k.altKonular : Array.isArray(k.alt) ? k.alt : Object.values(k.altKonular || k.alt || {}).map(String)
      })).filter(k=>k.ad);
    }

    function getWeekRange(d){
      const start = new Date(d);
      start.setHours(0,0,0,0);
      const end = new Date(start);
      end.setDate(start.getDate()+6);
      end.setHours(23,59,59,999);
      return {start,end};
    }

    function dateKey(d){
      const x = new Date(d);
      const y = x.getFullYear();
      const m = String(x.getMonth()+1).padStart(2,'0');
      const day = String(x.getDate()).padStart(2,'0');
      return `${y}-${m}-${day}`;
    }

    function normalizeTaskDateKey(value){
      const raw = safe(value);
      if(!raw) return '';
      if(/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
      let m = raw.match(/^(\d{1,2})[.\/\-](\d{1,2})[.\/\-](\d{4})$/);
      if(m){
        const day = String(Number(m[1])).padStart(2,'0');
        const month = String(Number(m[2])).padStart(2,'0');
        return `${m[3]}-${month}-${day}`;
      }
      m = raw.match(/^(\d{4})[.\/]?(\d{2})[.\/]?(\d{2})$/);
      if(m) return `${m[1]}-${m[2]}-${m[3]}`;
      const parsed = new Date(raw);
      if(!isNaN(parsed.getTime())) return dateKey(parsed);
      return raw;
    }

    function parseDateKey(key){
      const [y,m,d] = safe(key).split('-').map(Number);
      return new Date(y,m-1,d);
    }

    function formatDateTR(d){
      if(!d || isNaN(new Date(d).getTime())) return '';
      return new Date(d).toLocaleDateString('tr-TR',{day:'2-digit',month:'2-digit',year:'numeric'});
    }

    function dayNameTR(key){
      return parseDateKey(key).toLocaleDateString('tr-TR',{weekday:'long'});
    }

    function inDateRange(key,start,end){
      return key >= start && key <= end;
    }

    function sumField(arr,field){
      return arr.reduce((a,r)=>a+Number(r[field]||0),0);
    }

    function groupBy(arr,fn){
      return arr.reduce((acc,item)=>{ const k = fn(item); (acc[k] ||= []).push(item); return acc; },{});
    }

    function toNum(v){
      const n = Number(v);
      return Number.isFinite(n) ? n : 0;
    }

    function cleanId(v){
      return safe(v).replace(/\.0$/,'').replace(/\D/g,'');
    }

    function normalizeHeader(h){
      return safe(h).toLocaleLowerCase('tr-TR')
        .replaceAll('ı','i').replaceAll('ğ','g').replaceAll('ü','u').replaceAll('ş','s').replaceAll('ö','o').replaceAll('ç','c')
        .replace(/[^a-z0-9]/g,'');
    }

    function cellToString(cell){
      if(!cell) return '';
      const v = cell.f ?? cell.v ?? '';
      return safe(v).replace(/\.0$/,'');
    }

    function safe(v){ return (v === null || v === undefined) ? '' : String(v).trim(); }

    function escapeHtml(str){
      return safe(str).replace(/[&<>'"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[c]));
    }

    function showAlert(id,msg,type='info'){
      const el = document.getElementById(id);
      if(!el) return;
      el.className = `alert ${type} show`;
      el.textContent = msg;
    }

    function hideAlert(id){
      const el = document.getElementById(id);
      if(!el) return;
      el.className = 'alert';
      el.textContent = '';
    }

    function setLoading(show,text='Yükleniyor...'){
      document.getElementById('loading').classList.toggle('show', !!show);
      document.getElementById('loadingText').textContent = text;
    }
  </script>
</body>
</html>
